<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Welcome to Lionex</title>
</head>

<body style="margin:0;background:#090909;font-family:Arial,sans-serif;">

<div style="max-width:700px;margin:auto;background:#0d0d0d;color:white;">

    <!-- Hero Image -->
    <img src="https://yourdomain.com/assets/email-banner.webp"
         style="width:100%;display:block;">

    <div style="padding:50px;">

        <h1 style="font-size:42px;margin:0;">
            Welcome to Lionex,
            {{NAME}}
        </h1>

        <p style="font-size:18px;color:#bdbdbd;">
            Your account has been successfully registered for Early Access.
        </p>

        <div style="
            margin:40px 0;
            padding:30px;
            border:1px solid #262626;
            border-radius:20px;
            background:#141414;
        ">

            <p style="margin:0;color:#888;">
                Reserved Username
            </p>

            <h2 style="margin:10px 0;font-size:42px;">
                @{{USERNAME}}
            </h2>

        </div>

        <p>
            You're officially among the first members of Lionex.
            We'll notify you before launch and keep you updated with exclusive previews.
        </p>

        <a href="https://lionex.ai"
           style="
           display:inline-block;
           margin-top:35px;
           padding:18px 34px;
           background:white;
           color:black;
           text-decoration:none;
           border-radius:12px;
           font-weight:bold;">
            Visit Lionex
        </a>

    </div>

</div>

</body>
</html>
